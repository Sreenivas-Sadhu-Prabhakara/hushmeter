<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --black:  #0B0E0C;
    --panel:  #12160F;
    --line:   #2A331F;
    --line2:  #38431F;
    --paper:  #E7EFDD;
    --mute:   #8A9878;
    --lime:   #B6FF3C;
    --amber:  #FFB020;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(1100px 560px at 82% -12%, rgba(182,255,60,0.10), transparent 60%),
      radial-gradient(820px 480px at 4% 8%, rgba(255,176,32,0.06), transparent 55%),
      linear-gradient(180deg, #0c1109 0%, #0B0E0C 100%);
    font-family: var(--sans);
    color: var(--paper);
    -webkit-font-smoothing: antialiased;
  }

  /* instrument grid */
  .grid {
    position: absolute; inset: 0;
    width: 1200px; height: 630px;
    opacity: 0.5;
  }
  .grid line { stroke: var(--line); stroke-width: 1; }
  /* the scope trace */
  .trace { position: absolute; inset: 0; width: 1200px; height: 630px; }
  .trace path {
    fill: none; stroke: var(--lime); stroke-width: 3;
    filter: drop-shadow(0 0 8px rgba(182,255,60,0.5));
    opacity: 0.9;
  }
  .peak-dot { fill: var(--amber); filter: drop-shadow(0 0 6px rgba(255,176,32,0.7)); }

  .frame {
    position: absolute; inset: 0;
    padding: 82px 90px;
    display: flex; flex-direction: column;
    justify-content: space-between;
  }

  /* wordmark */
  .brand { display: flex; align-items: center; gap: 22px; }
  .mark {
    width: 76px; height: 76px; border-radius: 18px;
    background: var(--black);
    border: 1px solid var(--line2);
    box-shadow: 0 18px 44px -22px rgba(0,0,0,0.8);
  }
  .wordmark {
    font-size: 62px; font-weight: 800; letter-spacing: -0.04em;
    line-height: 1; color: var(--paper);
  }

  .headline { max-width: 880px; }
  .headline h1 {
    font-size: 62px; font-weight: 800; letter-spacing: -0.03em;
    line-height: 1.08; color: var(--paper);
  }
  .headline .accent { color: var(--lime); }
  .headline p {
    margin-top: 22px;
    font-size: 29px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--mute); line-height: 1.32; max-width: 30ch;
  }

  /* readout badge on the right */
  .readout {
    position: absolute; top: 78px; right: 90px;
    display: flex; align-items: baseline; gap: 12px;
    font-family: var(--mono);
    background: rgba(11,14,12,0.55);
    border: 1px solid var(--line2);
    border-radius: 16px;
    padding: 18px 26px;
  }
  .readout .n { font-size: 76px; font-weight: 700; color: var(--lime); letter-spacing: -0.03em;
    text-shadow: 0 0 26px rgba(182,255,60,0.3); }
  .readout .u { font-size: 26px; font-weight: 600; color: var(--mute); }

  /* chip row */
  .chips { display: flex; align-items: center; gap: 13px; }
  .chip {
    display: inline-flex; align-items: center; gap: 11px;
    padding: 12px 20px;
    border: 1px solid var(--line2);
    border-radius: 999px;
    background: rgba(11,14,12,0.45);
    font-family: var(--mono);
    font-size: 21px; font-weight: 600; letter-spacing: -0.01em;
    color: var(--mute);
  }
  .chip .dot { width: 11px; height: 11px; border-radius: 50%; }
  .chip .dot--lime { background: var(--lime); box-shadow: 0 0 0 4px rgba(182,255,60,0.14); }
  .chip .dot--amber { background: var(--amber); box-shadow: 0 0 0 4px rgba(255,176,32,0.14); }
</style>
</head>
<body>
  <!-- instrument grid -->
  <svg class="grid" viewBox="0 0 1200 630" preserveAspectRatio="none" aria-hidden="true">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
  </svg>

  <!-- scope trace across the middle -->
  <svg class="trace" viewBox="0 0 1200 630" preserveAspectRatio="none" aria-hidden="true">
    <path d="M-20 470 L 60 470 L 110 380 L 150 520 L 200 300 L 240 470 L 300 470 L 340 190 L 380 500 L 430 470 L 520 470 L 560 400 L 600 470 L 700 470 L 740 340 L 780 470 L 900 470 L 940 250 L 980 490 L 1020 470 L 1220 470"/>
    <circle class="peak-dot" cx="340" cy="190" r="9"/>
  </svg>

  <div class="frame">
    <div class="brand">
      <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
        <rect width="32" height="32" rx="7" fill="#0B0E0C"/>
        <path d="M4 16h4l2.5-8 4 15 3-11 2.5 6H27" fill="none" stroke="#B6FF3C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="19.5" cy="8" r="1.6" fill="#FFB020"/>
      </svg>
      <span class="wordmark">hushmeter</span>
    </div>

    <div class="headline">
      <h1>How loud is it&nbsp;— <span class="accent">really?</span></h1>
      <p>Measure a room's noise and chart it over time. Nothing recorded.</p>
    </div>

    <div class="chips">
      <span class="chip"><span class="dot dot--lime"></span>live meter</span>
      <span class="chip"><span class="dot dot--amber"></span>min / avg / peak</span>
      <span class="chip"><span class="dot dot--lime"></span>private &amp; offline</span>
      <span class="chip"><span class="dot dot--amber"></span>export CSV</span>
    </div>
  </div>

  <div class="readout">
    <span class="n">62</span>
    <span class="u">dB(rel)</span>
  </div>
</body>
</html>
