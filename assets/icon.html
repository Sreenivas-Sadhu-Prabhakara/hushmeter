<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0B0E0C; }
  body { display: grid; place-items: center; }
  /* ~12% safe padding -> mark fills the middle 76vmin (maskable-safe) */
  .mark { width: 76vmin; height: 76vmin; display: block; }
</style>
</head>
<body>
  <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
    <rect width="32" height="32" rx="7" fill="#0B0E0C"/>
    <line x1="4" y1="16" x2="28" y2="16" stroke="#2A331F" stroke-width="1"/>
    <path d="M4 16h3.5l2.5-9 4 17 3-13 2.5 8H28"
          fill="none" stroke="#B6FF3C" stroke-width="2.4"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="16" cy="7" r="1.9" fill="#FFB020"/>
  </svg>
</body>
</html>
